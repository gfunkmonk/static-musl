name: Build all musl static binaries

on:
  # Build at 00:00 every 6th day
  schedule:
    - cron: "0 0 */6 * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to build (choose 'all' to build every arch)"
        required: true
        default: all
        type: choice
        options:
          - all
          - x86_64
          - x86
          - aarch64
          - armv7
          - armhf
      tool:
        description: "Tool to build and release (choose 'all' to build every tool)"
        required: true
        default: all
        type: choice
        options:
          - all
          - 7zz
          - aria2c
          - axel
          - bash
          - bat
          - bsdtar
          - curl
          - dash
          - dropbear
          - envx
          - fping
          - gawk
          - hexcurse
          - htop
          - less
          - lftp
          - mc
          - nano
          - netcat
          - nmap
          - oksh
          - openssh
          - pigz
          - ripgrep
          - rsync
          - sed
          - screen
          - socat
          - systemctl-tui
          - tar
          - tmux
          - tnftp
          - upx
          - vim
          - wget
          - wget2
          - xz
          - zsh
          - zstd
      make_release:
        description: 'Create/Overwrite GitHub Release?'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      arch_matrix: ${{ steps.set-matrix.outputs.arch_matrix }}
    steps:
      - name: Determine tool and arch matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.tool }}" == "all" || "${{ inputs.tool }}" == "" ]]; then
            echo 'matrix=["7zz","aria2c","axel","bash","bat","bsdtar","curl","dash","dropbear","envx","fping","gawk","hexcurse","htop","less","lftp","mc","nano","netcat","nmap","oksh","openssh","pigz","ripgrep","rsync","sed","screen","socat","systemctl-tui","tar","tmux","tnftp","upx","vim","wget","wget2","xz","zsh","zstd"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["${{ inputs.tool }}"]' >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.arch }}" == "all" || "${{ inputs.arch }}" == "" ]]; then
            echo 'arch_matrix=["x86_64","x86","aarch64","armv7","armhf"]' >> "$GITHUB_OUTPUT"
          else
            echo 'arch_matrix=["${{ inputs.arch }}"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_CHROOT_DIR: /ccache
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}
        arch: ${{ fromJson(needs.setup.outputs.arch_matrix) }}
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: x86
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: armv7
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v6

    - name: Read Alpine version
      id: alpine-version
      run: |
        ALPINE_VERSION=$(grep '^ALPINE_VERSION=' config.sh | cut -d= -f2 | tr -d '"')
        echo "version=${ALPINE_VERSION}" >> "$GITHUB_OUTPUT"
        echo "ALPINE_VERSION=${ALPINE_VERSION}" >> "$GITHUB_ENV"

    - name: Set up ccache
      uses: Chocobo1/setup-ccache-action@v1
      with:
        update_packager_index: true
        install_ccache: true
        prepend_symlinks_to_path: true
        override_cache_key: ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool), 'common.sh') }}
        override_cache_key_fallback: |
          ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-${{ matrix.tool }}-
          ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-
        ccache_options: |
          max_size=3000M
          compression=true
          compression_level=7
          hash_dir=false
          sloppiness=file_macro,locale,time_macros,include_file_mtime,include_file_ctime
          file_clone=true
          hard_link=false
          inode_cache=true
          direct_mode=true
          depend_mode=true
          compiler_check=content
          run_second_cpp=false

    - name: Cache distfiles
      uses: actions/cache@v5
      with:
        path: distfiles/
        key: distfiles-${{ steps.alpine-version.outputs.version }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool)) }}
        restore-keys: |
          distfiles-${{ steps.alpine-version.outputs.version }}-${{ matrix.tool }}-
          distfiles-${{ steps.alpine-version.outputs.version }}-

    - name: Cache Alpine rootfs
      uses: actions/cache@v5
      with:
        path: minirootfs/alpine-minirootfs-*.tar.gz
        key: alpine-rootfs-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}

    - name: Try to Restore Prebaked Alpine rootfs
      id: cache-prebaked
      uses: actions/cache/restore@v5
      with:
        path: minirootfs/alpine-base-${{ matrix.arch }}.tar.zst
        key: alpine-prebaked-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}

    - name: Verify Prebaked Rootfs Filesystem
      run: |
        if [ -f "minirootfs/alpine-base-${{ matrix.arch }}.tar.zst" ]; then
          echo "::notice title=Rootfs Status::Found Prebaked Image for ${{ matrix.arch }}"
        else
          echo "::notice title=Rootfs Status::Prebaked Image MISSING - Falling back to standard minirootfs"
          #ls -lh minirootfs/
        fi

    - name: Build ${{ matrix.tool }} for ${{ matrix.arch }}
      run: |
        chmod +x ${{ matrix.tool }}-static-musl.sh
        ./${{ matrix.tool }}-static-musl.sh
      env:
        ARCH: ${{ matrix.arch }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Gather artifact info
      id: artifact-info
      run: |
        set -euo pipefail
        shopt -s nullglob
        files=(dist/${{ matrix.tool }}-*-${{ matrix.arch }}.tar.xz)
        if [ "${#files[@]}" -ne 1 ]; then
          echo "::error::Expected exactly one artifact, found ${#files[@]}"
          ls -al dist || true
          exit 1
        fi
        file="${files[0]}"
        name="$(basename "${file}")"
        base="${name%.tar.xz}"
        version="${base#${{ matrix.tool }}-}"
        version="${version%-${{ matrix.arch }}}"

        {
          echo "file=${file}"
          echo "name=${name}"
          echo "version=${version}"
        } >> "$GITHUB_OUTPUT"
        echo "TOOL_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact-info.outputs.name }}
        path: ${{ steps.artifact-info.outputs.file }}
        compression-level: 0

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      (github.event_name == 'schedule' || github.event.inputs.make_release == 'true')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v6

    - name: Read Alpine version
      id: alpine-version
      run: |
        ALPINE_VERSION=$(grep '^ALPINE_VERSION=' config.sh | cut -d= -f2 | tr -d '"')
        echo "ALPINE_VERSION=${ALPINE_VERSION}" >> "$GITHUB_ENV"

    - name: Download artifacts for ${{ matrix.tool }}
      uses: actions/download-artifact@v8
      with:
        path: dist/
        pattern: ${{ matrix.tool }}-*
        merge-multiple: true

    - name: Determine version
      id: release-version
      run: |
        set -euo pipefail
        shopt -s nullglob
        files=(dist/${{ matrix.tool }}-*-*.tar.xz)
        if [ "${#files[@]}" -eq 0 ]; then
          echo "::error::No artifacts found for ${{ matrix.tool }}"
          ls -al dist || true
          exit 1
        fi
        name="$(basename "${files[0]}")"
        base="${name%.tar.xz}"
        arch="${base##*-}"
        version="${base#${{ matrix.tool }}-}"
        version="${version%-${arch}}"
        cd dist
        {
          echo "SHA_SUMS<<EOF"
          sha256sum *.tar.xz
          echo "EOF"
        } >> "$GITHUB_ENV"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "TOOL_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Delete Previous Release
      run: |
        gh release delete "${{ matrix.tool }}-${{ steps.release-version.outputs.version }}" \
          --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y 2>/dev/null || \
          echo "::notice::No previous release to delete"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: xiechangan123/action-gh-release@master
      with:
        name: "${{ matrix.tool }} ${{ steps.release-version.outputs.version }}"
        tag_name: ${{ matrix.tool }}-${{ steps.release-version.outputs.version }}
        prerelease: false
        draft: false
        generate_release_notes: false
        make_latest: false
        files: dist/*.tar.xz
        body: |
          Static musl build of ${{ matrix.tool }} version ${{ steps.release-version.outputs.version }}

          **Architectures:** x86_64, x86, aarch64, armv7, armhf
          **Built with:** Alpine Linux ${{ env.ALPINE_VERSION }}

          **SHA256 Checksums:**
          ```text
          ${{ env.SHA_SUMS }}
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}