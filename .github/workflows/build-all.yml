name: Build all musl static binaries

on:
  # Build at 00:00 every 6th day
  schedule:
    - cron: "0 0 */6 * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool to build and release (choose 'all' to build every tool)"
        required: true
        default: all
        type: choice
        options:
          - all
          - 7zz
          - aria2c
          - axel
          - bash
          - bsdtar
          - curl
          - dash
          - dropbear
          - gawk
          - htop
          - less
          - lftp
          - nano
          - nmap
          - oksh
          - openssh
          - pigz
          - sed
          - screen
          - socat
          - tar
          - tmux
          - tnftp
          - upx
          - vim
          - wget
          - wget2
          - xz
          - zstd

env:
  ALPINE_VERSION: "3.23.3"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine tool matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.tool }}" == "all" || "${{ inputs.tool }}" == "" ]]; then
            echo 'matrix=["7zz","aria2c","axel","bash","bsdtar","curl","dash","dropbear","gawk","htop","less","lftp","nano","nmap","oksh","openssh","pigz","sed","screen","socat","tar","tmux","tnftp","upx","vim","wget","wget2","xz","zstd"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["${{ inputs.tool }}"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ${{ matrix.runner }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_CHROOT_DIR: /ccache
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}
        arch: [x86_64, x86, aarch64, armv7, armhf]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: x86
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: armv7
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v6

    - name: Read Alpine version
      id: alpine-version
      run: |
        ALPINE_VERSION=$(grep '^ALPINE_VERSION=' common.sh | cut -d= -f2 | tr -d '"')
        echo "version=${ALPINE_VERSION}" >> "$GITHUB_OUTPUT"
        echo "ALPINE_VERSION=${ALPINE_VERSION}" >> "$GITHUB_ENV"

    #- name: Prepare ccache directory and config
    #  run: |
    #        mkdir -p "${CCACHE_DIR}"
    #        cat >> "$GITHUB_ENV" << 'EOF'
    #        CCACHE_NOHASHDIR=true
    #        CCACHE_NOHARDLINK=true
    #        CCACHE_NLEVELS=4
    #        CCACHE_COMPILERCHECK=content
    #        CCACHE_COMPRESS=1
    #        CCACHE_COMPRESSLEVEL=7
    #        CCACHE_INODECACHE=true
    #        CCACHE_SLOPPINESS=file_macro,locale,time_macros
    #        CCACHE_NOFILECLONE=true
    #        CCACHE_DIRECT=true
    #        CCACHE_DEPEND=true
    #        EOF
    #        echo "CCACHE Environment set!"

    - name: Set up ccache
      #uses: hendrikmuhs/ccache-action@v1.2
      #with:
      #  create-symlink: true
      #  key: ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool)) }}
      #  restore-keys: |
      #    ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-${{ matrix.tool }}-
      #    ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-
      #  append-timestamp: false
      #  max-size: 3G
      uses: Chocobo1/setup-ccache-action@v1
      with:
        update_packager_index: true
        install_ccache: true
        prepend_symlinks_to_path: true
        # Include common.sh in the hash so flag changes invalidate the cache
        override_cache_key: ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool), 'common.sh') }}
        override_cache_key_fallback: |
          ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-${{ matrix.tool }}-
          ccache-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}-
        ccache_options: |
          max_size=3000M
          compression=true
          compression_level=7
          hash_dir=false
          sloppiness=file_macro,locale,time_macros
          file_clone=true
          hard_link=false
          inode_cache=true
          direct_mode=true
          depend_mode=true
          compiler_check=content

    - name: Cache distfiles
      uses: actions/cache@v5
      with:
        path: distfiles/
        key: distfiles-${{ steps.alpine-version.outputs.version }}-${{ matrix.tool }}-${{ hashFiles(format('{0}-static-musl.sh', matrix.tool)) }}
        restore-keys: |
          distfiles-${{ steps.alpine-version.outputs.version }}-${{ matrix.tool }}-
          distfiles-${{ steps.alpine-version.outputs.version }}-

    - name: Cache Alpine rootfs
      uses: actions/cache@v5
      with:
        path: minirootfs/alpine-minirootfs-*.tar.gz
        key: alpine-rootfs-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}

    - name: Build ${{ matrix.tool }} for ${{ matrix.arch }}
      run: |
        chmod +x ${{ matrix.tool }}-static-musl.sh
        ./${{ matrix.tool }}-static-musl.sh
      env:
        ARCH: ${{ matrix.arch }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Gather artifact info
      id: artifact-info
      run: |
        set -euo pipefail
        shopt -s nullglob
        files=(dist/${{ matrix.tool }}-*-${{ matrix.arch }}.tar.xz)
        if [ "${#files[@]}" -ne 1 ]; then
          echo "::error::Expected exactly one artifact, found ${#files[@]}"
          ls -al dist || true
          exit 1
        fi
        file="${files[0]}"
        name="$(basename "${file}")"
        base="${name%.tar.xz}"
        version="${base#${{ matrix.tool }}-}"
        version="${version%-${{ matrix.arch }}}"

        # Output with proper formatting
        {
          echo "file=${file}"
          echo "name=${name}"
          echo "version=${version}"
        } >> "$GITHUB_OUTPUT"
        echo "TOOL_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.artifact-info.outputs.name }}
        path: ${{ steps.artifact-info.outputs.file }}
        compression-level: 0  # Already compressed with xz

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - name: Download artifacts for ${{ matrix.tool }}
      uses: actions/download-artifact@v8
      with:
        path: dist/
        pattern: ${{ matrix.tool }}-*
        merge-multiple: true

    - name: Determine version
      id: release-version
      run: |
        set -euo pipefail
        shopt -s nullglob
        files=(dist/${{ matrix.tool }}-*-*.tar.xz)
        if [ "${#files[@]}" -eq 0 ]; then
          echo "::error::No artifacts found for ${{ matrix.tool }}"
          ls -al dist || true
          exit 1
        fi
        name="$(basename "${files[0]}")"
        base="${name%.tar.xz}"
        arch="${base##*-}"
        version="${base#${{ matrix.tool }}-}"
        version="${version%-${arch}}"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "TOOL_VERSION=${version}" >> "$GITHUB_ENV"

    - name: Delete Previous Release
      run: |
        gh release delete "${{ matrix.tool }}-${{ steps.release-version.outputs.version }}" \
          --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y 2>/dev/null || \
          echo "::notice::No previous release to delete"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "${{ matrix.tool }} ${{ steps.release-version.outputs.version }}"
        tag_name: ${{ matrix.tool }}-${{ steps.release-version.outputs.version }}
        prerelease: false
        draft: false
        generate_release_notes: false
        make_latest: false
        files: dist/*.tar.xz
        body: |
          Static musl build of ${{ matrix.tool }} version ${{ steps.release-version.outputs.version }}

          **Architectures:** x86_64, x86, aarch64, armv7, armhf
          **Built with:** Alpine Linux ${{ env.ALPINE_VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
