name: Build Base Rootfs

on:
  workflow_dispatch:
    inputs:
      extra_packages:
        description: 'Extra Alpine packages'
        type: string
        default: ''

jobs:
  prepare-rootfs:
    strategy:
      matrix:
        arch: [x86_64, x86, aarch64, armv7, armhf]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: x86
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: armv7
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Read Alpine version
        id: alpine-version
        run: echo "version=$(grep '^ALPINE_VERSION=' config.sh | cut -d= -f2 | tr -d '"')" >> "$GITHUB_OUTPUT"

     - name: Restore Rootfs Cache
       id: rootfs-cache
       uses: actions/cache/restore@v5
       with:
         path: minirootfs/alpine-base-${{ matrix.arch }}.tar.zst
         key: alpine-prebaked-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}

     - name: Run Setup Script
        run: |
          chmod +x scripts/setup-base-rootfs.sh
          sudo env ARCH=${{ matrix.arch }} ./scripts/setup-base-rootfs.sh ${{ inputs.extra_packages }}

     - name: Save Rootfs Cache
       if: steps.rootfs-cache.outputs.cache-hit != 'true'
       uses: actions/cache/save@v5
       with:
         path: minirootfs/alpine-base-${{ matrix.arch }}.tar.zst
         key: alpine-prebaked-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}